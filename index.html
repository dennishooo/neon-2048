<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-180.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0b0d17" />
    <meta name="color-scheme" content="dark light" />

    <!-- iOS Safari: behave like a native app once added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="2048" />
    <meta name="format-detection" content="telephone=no" />

    <title>2048 — Neon</title>
  </head>
  <body>
    <div id="app">
      <header class="hud">
        <div class="brand">
          <span class="brand-num">2048</span>
          <span class="brand-tag">neon</span>
        </div>
        <div class="scores">
          <div class="score-card" data-role="score">
            <div class="score-label">SCORE</div>
            <div class="score-value" id="score">0</div>
          </div>
          <div class="score-card" data-role="best">
            <div class="score-label">BEST</div>
            <div class="score-value" id="best">0</div>
          </div>
        </div>
      </header>

      <main class="board-wrap" id="board-wrap">
        <canvas id="board" aria-label="2048 game board" tabindex="0"></canvas>
        <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
        <div class="overlay" id="overlay" hidden>
          <div class="overlay-card">
            <div class="overlay-title" id="overlay-title">You Win!</div>
            <div class="overlay-sub" id="overlay-sub">Reached 2048</div>
            <div class="overlay-actions">
              <button class="btn btn-primary" id="overlay-continue">Keep going</button>
              <button class="btn" id="overlay-restart">New game</button>
            </div>
          </div>
        </div>
      </main>

      <footer class="controls">
        <button class="btn" id="btn-undo" title="Undo last move (Z)">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 5V2L7 7l5 5V8a5 5 0 1 1-5 5H5a7 7 0 1 0 7-8z"
            />
          </svg>
          <span>Undo</span>
        </button>

        <div class="theme-wrap">
          <button
            class="btn btn-icon"
            id="btn-theme"
            title="Change theme"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path
                fill="currentColor"
                d="M12 3a9 9 0 1 0 0 18 2 2 0 0 0 1.6-3.2 1.5 1.5 0 0 1 1.2-2.4H17a4 4 0 0 0 4-4c0-4.97-4.03-8.4-9-8.4zM6.5 12a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3-4.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3 4.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"
              />
            </svg>
          </button>
          <div class="theme-menu" id="theme-menu" role="menu" hidden></div>
        </div>

        <button class="btn btn-primary" id="btn-new">New game</button>
        <div class="hint">Arrows / WASD · Swipe · Drag</div>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
